name: Generate quote card

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/generate-quote.js"
      - ".github/workflows/quote.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate quote SVG
        run: node scripts/generate-quote.js

      - name: Bust cache on the quote image references
        run: |
          v=$(date -u +%Y%m%d%H%M)
          perl -pi -e "s/(quote(?:-light)?\.svg\?v=)[^\"]*/\${1}$v/g" README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/quote.svg assets/quote-light.svg README.md
          git diff --cached --quiet || git commit -m "chore: refresh quote of the day"
          git push
