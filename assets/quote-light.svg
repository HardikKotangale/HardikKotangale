<svg width="800" height="132" viewBox="0 0 800 132" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <rect x="0" y="6" width="3" height="120" rx="1.5" fill="url(#accent)"/>

  <text x="20" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="46" fill="url(#mark)" opacity="0.7">&#8220;</text>

  <text x="56" y="36" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="17" font-style="italic" fill="#1f2328"><tspan x="56" dy="0">Do Something. If it works, do more of it. If it doesn't,</tspan><tspan x="56" dy="27">do something else.</tspan></text>

  <text x="56" y="116" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="14" fill="url(#accent)">&#8212; Franklin D. Roosevelt</text>
</svg>